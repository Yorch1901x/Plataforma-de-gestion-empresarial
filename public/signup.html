<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Portal</title>
    <style>
        /* Variables de diseño para modo oscuro */
        :root {
            --primary-color: #ffffff;
            --primary-hover: #e5e7eb;
            --bg-body: #000000;
            --text-color: #ffffff;
            --bg-card: #000000;
            --border-color: #ffffff;
            --input-bg: #111111;
            --error-bg: #ffffff;
            --error-text: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-body);
            padding: 20px;
            color: var(--text-color);
        }

        /* Contenedor principal con borde blanco */
        .signup-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 0px;
            border: 1px solid var(--border-color);
            box-shadow: 10px 10px 0px rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signup-header {
            text-align: left;
            margin-bottom: 30px;
            border-left: 4px solid #ffffff;
            padding-left: 15px;
        }

        .signup-header h1 {
            color: var(--text-color);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .signup-header p {
            color: #888;
            font-size: 0.85rem;
        }

        /* Estilos del formulario */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 0px;
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus {
            border-color: #ffffff;
            background-color: #000000;
        }

        /* Botón de mostrar contraseña */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 34px;
            cursor: pointer;
            color: #888;
            background: none;
            border: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .toggle-password:hover {
            color: #ffffff;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #000;
            border: 1px solid #ffffff;
            border-radius: 0px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            background-color: #000;
            color: #fff;
        }

        .signup-btn:disabled {
            background-color: #333;
            border-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Mensajes de error invertidos */
        .error-message {
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .success-message {
            background-color: #0a0;
            color: #fff;
            padding: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #888;
        }

        .footer-text a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .password-requirements {
            font-size: 0.7rem;
            color: #888;
            margin-top: 10px;
            line-height: 1.5;
        }

        .password-requirements.valid {
            color: #0a0;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <div class="signup-header">
            <h1>Registro</h1>
            <p>Crea tu nueva cuenta</p>
        </div>

        <div id="errorBox" class="error-message"></div>
        <div id="successBox" class="success-message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Clave de Seguridad</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                <button type="button" class="toggle-password" id="toggleBtn">Ver</button>
                <div class="password-requirements" id="passwordRequirements">
                    ✗ Mínimo 6 caracteres
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                <button type="button" class="toggle-password" id="toggleConfirmBtn">Ver</button>
            </div>

            <button type="submit" class="signup-btn" id="submitBtn">Crear Cuenta</button>
        </form>

        <div class="footer-text">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // Obtener configuración de Firebase desde el servidor
        let firebaseConfig = null;
        let auth = null;

        async function initializeFirebase() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                firebaseConfig = data.firebaseConfig;
                
                // Initialize Firebase
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                
                console.log('Firebase inicializado correctamente');
            } catch (error) {
                console.error('Error al obtener configuración de Firebase:', error);
            }
        }

        // Inicializar Firebase antes de hacer nada
        await initializeFirebase();

        const signupForm = document.getElementById('signupForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleConfirmBtn = document.getElementById('toggleConfirmBtn');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const submitBtn = document.getElementById('submitBtn');
        const passwordRequirements = document.getElementById('passwordRequirements');

        // Validar requisitos de contraseña
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            if (password.length >= 6) {
                passwordRequirements.classList.add('valid');
                passwordRequirements.textContent = '✓ Contraseña válida';
            } else {
                passwordRequirements.classList.remove('valid');
                passwordRequirements.textContent = '✗ Mínimo 6 caracteres';
            }
            errorBox.style.display = 'none';
        });

        // Lógica para mostrar/ocultar contraseña
        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? 'Ocultar' : 'Ver';
        });

        toggleConfirmBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = confirmPasswordInput.type === 'password';
            confirmPasswordInput.type = isPassword ? 'text' : 'password';
            toggleConfirmBtn.textContent = isPassword ? 'Ocultar' : 'Ver';
        });

        // Manejo del envío del formulario con Firebase
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            console.log('Intentando registrar usuario con email:', email);

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            // Validar que las contraseñas coincidan
            if (password !== confirmPassword) {
                errorBox.textContent = 'Las contraseñas no coinciden';
                errorBox.style.display = 'block';
                return;
            }

            // Validar longitud mínima
            if (password.length < 6) {
                errorBox.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorBox.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'CREANDO CUENTA...';

            try {
                console.log('Llamando a createUserWithEmailAndPassword...');
                
                // Crear usuario con Firebase
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log('Usuario creado exitosamente:', user.uid, user.email);
                
                // Guardar token en localStorage
                const token = await user.getIdToken();
                localStorage.setItem('authToken', token);
                localStorage.setItem('userEmail', user.email);
                
                // Mostrar mensaje de éxito
                successBox.textContent = '¡Cuenta creada exitosamente! Redirigiendo...';
                successBox.style.display = 'block';
                
                // Redirigir después de 2 segundos al dashboard
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 2000);
            } catch (error) {
                console.error('Error al crear usuario:', error.code, error.message);
                
                // Manejo de errores de Firebase
                let errorMessage = 'Error al crear la cuenta';
                
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Este email ya está registrado';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email inválido';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'La contraseña es muy débil';
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'El registro está deshabilitado en Firebase Console';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                console.error('Mensaje de error:', errorMessage);
                errorBox.textContent = errorMessage;
                errorBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Crear Cuenta';
            }
        });
    </script>
</body>
</html>
