<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Portal</title>
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body>

    <div class="signup-card">
        <div class="signup-header">
            <h1>Registro</h1>
            <p>Crea tu nueva cuenta</p>
        </div>

        <div id="errorBox" class="error-message"></div>
        <div id="successBox" class="success-message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Clave de Seguridad</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                <button type="button" class="toggle-password" id="toggleBtn">Ver</button>
                <div class="password-requirements" id="passwordRequirements">
                    ✗ Mínimo 6 caracteres
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                <button type="button" class="toggle-password" id="toggleConfirmBtn">Ver</button>
            </div>

            <button type="submit" class="signup-btn" id="submitBtn">Crear Cuenta</button>
        </form>

        <div class="footer-text">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script type="module" src="/assets/js/signup.js"></script>
</body>

</html>
