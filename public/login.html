<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Portal</title>
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body>

    <div class="login-card">
        <div class="login-header">
            <h1>Acceso</h1>
            <p>Introduce tus datos de sistema</p>
        </div>

        <div id="errorBox" class="error-message">
            Acceso Denegado
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Identificador</label>
                <input type="email" id="email" placeholder="usuario@red.com" required>
            </div>

            <div class="form-group">
                <label for="password">Clave de Seguridad</label>
                <input type="password" id="password" placeholder="********" required>
                <button type="button" class="toggle-password" id="toggleBtn">Ver</button>
            </div>

            <div class="actions">
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox"> Recordar
                </label>
                <a href="forgot-password.html">Olvido de clave</a>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">Ingresar</button>
        </form>

        <div class="footer-text">
            ¿Nuevo usuario? <a href="signup.html">Registrar</a>
        </div>
    </div>

    <script type="module" src="/assets/js/login.js"></script>
</body>

</html>
