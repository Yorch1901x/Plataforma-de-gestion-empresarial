<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Portal</title>
    <style>
        /* Variables de diseño para modo oscuro */
        :root {
            --primary-color: #ffffff;
            --primary-hover: #e5e7eb;
            --bg-body: #000000;
            --text-color: #ffffff;
            --bg-card: #000000;
            --border-color: #ffffff;
            --input-bg: #111111;
            --error-bg: #ffffff;
            --error-text: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-body);
            padding: 20px;
            color: var(--text-color);
        }

        /* Contenedor principal con borde blanco */
        .login-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 0px;
            border: 1px solid var(--border-color);
            box-shadow: 10px 10px 0px rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: left;
            margin-bottom: 30px;
            border-left: 4px solid #ffffff;
            padding-left: 15px;
        }

        .login-header h1 {
            color: var(--text-color);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .login-header p {
            color: #888;
            font-size: 0.85rem;
        }

        /* Estilos del formulario */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 0px;
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus {
            border-color: #ffffff;
            background-color: #000000;
        }

        /* Botón de mostrar contraseña */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 34px;
            cursor: pointer;
            color: #888;
            background: none;
            border: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .toggle-password:hover {
            color: #ffffff;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.8rem;
        }

        .actions a {
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .actions a:hover {
            color: #fff;
            border-bottom: 1px solid #fff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #000;
            border: 1px solid #ffffff;
            border-radius: 0px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background-color: #000;
            color: #fff;
        }

        .login-btn:disabled {
            background-color: #333;
            border-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Mensajes de error invertidos */
        .error-message {
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #888;
        }

        .footer-text a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Checkbox personalizado */
        input[type="checkbox"] {
            accent-color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h1>Acceso</h1>
            <p>Introduce tus datos de sistema</p>
        </div>

        <div id="errorBox" class="error-message">
            Acceso Denegado
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Identificador</label>
                <input type="email" id="email" placeholder="usuario@red.com" required>
            </div>

            <div class="form-group">
                <label for="password">Clave de Seguridad</label>
                <input type="password" id="password" placeholder="********" required>
                <button type="button" class="toggle-password" id="toggleBtn">Ver</button>
            </div>

            <div class="actions">
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox"> Recordar
                </label>
                <a href="forgot-password.html">Olvido de clave</a>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">Ingresar</button>
        </form>

        <div class="footer-text">
            ¿Nuevo usuario? <a href="signup.html">Registrar</a>
        </div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // Obtener configuración de Firebase desde el servidor
        let firebaseConfig = null;
        let auth = null;

        async function initializeFirebase() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                firebaseConfig = data.firebaseConfig;
                
                // Initialize Firebase
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                
                console.log('Firebase inicializado correctamente');
            } catch (error) {
                console.error('Error al obtener configuración de Firebase:', error);
            }
        }

        // Inicializar Firebase antes de hacer nada
        await initializeFirebase();

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggleBtn');
        const errorBox = document.getElementById('errorBox');
        const submitBtn = document.getElementById('submitBtn');

        // Lógica para mostrar/ocultar contraseña
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? 'Ocultar' : 'Ver';
        });

        // Manejo del envío del formulario con Firebase
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'AUTENTICANDO...';
            errorBox.style.display = 'none';

            const email = emailInput.value;
            const password = passwordInput.value;

            console.log('Intentando autenticar con email:', email);

            try {
                // Autenticar con Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log('Autenticación exitosa:', user.email);
                
                // Obtener token de autenticación
                const token = await user.getIdToken();
                
                console.log('Token obtenido');
                
                // Guardar token en localStorage
                localStorage.setItem('authToken', token);
                localStorage.setItem('userEmail', user.email);
                
                console.log('Token guardado en localStorage');
                
                // Redirigir al dashboard
                console.log('Redirigiendo a /dashboard');
                window.location.href = '/dashboard';
            } catch (error) {
                console.error('Error de autenticación:', error.code, error.message);
                
                // Manejo de errores de Firebase
                let errorMessage = 'Acceso Denegado';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'Usuario no encontrado';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Contraseña incorrecta';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email inválido';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Demasiados intentos. Intenta más tarde';
                        break;
                    default:
                        errorMessage = error.message || 'Error al iniciar sesión';
                }
                
                errorBox.textContent = errorMessage;
                errorBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar';
                passwordInput.value = '';
            }
        });

        // Limpiar error al escribir
        [emailInput, passwordInput].forEach(input => {
            input.addEventListener('input', () => {
                errorBox.style.display = 'none';
            });
        });
    </script>
</body>
</html>
