<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Portal</title>
    <style>
        /* Variables de diseño para modo oscuro */
        :root {
            --primary-color: #ffffff;
            --primary-hover: #e5e7eb;
            --bg-body: #000000;
            --text-color: #ffffff;
            --bg-card: #000000;
            --border-color: #ffffff;
            --input-bg: #111111;
            --error-bg: #ffffff;
            --error-text: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-body);
            padding: 20px;
            color: var(--text-color);
        }

        /* Contenedor principal con borde blanco */
        .reset-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 0px;
            border: 1px solid var(--border-color);
            box-shadow: 10px 10px 0px rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reset-header {
            text-align: left;
            margin-bottom: 30px;
            border-left: 4px solid #ffffff;
            padding-left: 15px;
        }

        .reset-header h1 {
            color: var(--text-color);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .reset-header p {
            color: #888;
            font-size: 0.85rem;
        }

        /* Estilos del formulario */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #333;
            color: #ffffff;
            border-radius: 0px;
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus {
            border-color: #ffffff;
            background-color: #000000;
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #000;
            border: 1px solid #ffffff;
            border-radius: 0px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background-color: #000;
            color: #fff;
        }

        .reset-btn:disabled {
            background-color: #333;
            border-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Mensajes de error y éxito */
        .error-message {
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .success-message {
            background-color: #0a0;
            color: #fff;
            padding: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        .info-text {
            background-color: #1a1a1a;
            color: #888;
            padding: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border-left: 3px solid #fff;
            line-height: 1.6;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #888;
        }

        .footer-text a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="reset-header">
            <h1>Recuperar Acceso</h1>
            <p>Restablece tu contraseña</p>
        </div>

        <div id="errorBox" class="error-message"></div>
        <div id="successBox" class="success-message"></div>

        <div class="info-text" id="infoText">
            Ingresa tu correo electrónico y recibirás un enlace para restablecer tu contraseña.
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>

            <button type="submit" class="reset-btn" id="submitBtn">Enviar Enlace de Recuperación</button>
        </form>

        <div class="footer-text">
            <a href="login.html">← Volver al inicio de sesión</a>
        </div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // Obtener configuración de Firebase desde el servidor
        let firebaseConfig = null;
        let auth = null;

        async function initializeFirebase() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                firebaseConfig = data.firebaseConfig;
                
                // Initialize Firebase
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                
                console.log('Firebase inicializado correctamente');
            } catch (error) {
                console.error('Error al obtener configuración de Firebase:', error);
            }
        }

        // Inicializar Firebase antes de hacer nada
        await initializeFirebase();

        const resetForm = document.getElementById('resetForm');
        const emailInput = document.getElementById('email');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const infoText = document.getElementById('infoText');
        const submitBtn = document.getElementById('submitBtn');

        // Manejo del envío del formulario
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value;

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            submitBtn.disabled = true;
            submitBtn.textContent = 'ENVIANDO...';

            try {
                // Enviar email de recuperación con Firebase
                await sendPasswordResetEmail(auth, email);
                
                // Mostrar mensaje de éxito
                infoText.style.display = 'none';
                successBox.textContent = '¡Correo enviado! Revisa tu bandeja de entrada.';
                successBox.style.display = 'block';
                
                // Limpiar formulario
                resetForm.reset();
                
                // Ocultar botón de envío
                submitBtn.style.display = 'none';
                
                // Mostrar enlace de volver después de 5 segundos
                setTimeout(() => {
                    resetForm.style.display = 'none';
                }, 5000);
            } catch (error) {
                // Manejo de errores de Firebase
                let errorMessage = 'Error al enviar el correo';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No existe una cuenta con este correo';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Correo electrónico inválido';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Demasiados intentos. Intenta más tarde';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                errorBox.textContent = errorMessage;
                errorBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Enlace de Recuperación';
            }
        });

        // Limpiar error al escribir
        emailInput.addEventListener('input', () => {
            errorBox.style.display = 'none';
        });
    </script>
</body>
</html>
