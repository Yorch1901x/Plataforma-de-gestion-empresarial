<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Portal</title>
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body>

    <div class="reset-card">
        <div class="reset-header">
            <h1>Recuperar Acceso</h1>
            <p>Restablece tu contraseña</p>
        </div>

        <div id="errorBox" class="error-message"></div>
        <div id="successBox" class="success-message"></div>

        <div class="info-text" id="infoText">
            Ingresa tu correo electrónico y recibirás un enlace para restablecer tu contraseña.
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>

            <button type="submit" class="reset-btn" id="submitBtn">Enviar Enlace de Recuperación</button>
        </form>

        <div class="footer-text">
            <a href="login.html">← Volver al inicio de sesión</a>
        </div>
    </div>

    <script type="module" src="/assets/js/forgot-password.js"></script>
</body>

</html>
